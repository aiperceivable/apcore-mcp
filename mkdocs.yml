site_name: apcore-mcp
site_description: Automatic MCP Server & OpenAI Tools Bridge for apcore — zero code changes required.
site_url: https://aiperceivable.github.io/apcore-mcp/
repo_url: https://github.com/aiperceivable/apcore-mcp
repo_name: aiperceivable/apcore-mcp
theme:
  name: material
  logo: assets/apcore-mcp-logo.svg
  favicon: assets/apcore-mcp-logo.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

plugins:
  - search

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Features:
      - Overview: features/overview.md
      - Schema Converter: features/schema-converter.md
      - Annotation Mapper: features/annotation-mapper.md
      - Execution Router: features/execution-router.md
      - Error Mapper: features/error-mapper.md
      - MCP Server Factory: features/mcp-server-factory.md
      - OpenAI Converter: features/openai-converter.md
      - Transport Manager: features/transport-manager.md
      - Registry Listener: features/registry-listener.md
      - JWT Authenticator: features/jwt-authenticator.md
      - Approval Handler: features/approval-handler.md
      - Explorer UI: features/explorer-ui.md
  - Specifications:
      - Product Requirements: prd-apcore-mcp.md
      - Software Requirements: srs-apcore-mcp.md
      - Technical Design: tech-design-apcore-mcp.md
      - Test Plan: test-plan-apcore-mcp.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aiperceivable/apcore-mcp
